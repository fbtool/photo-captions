<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actress Captions ✨</title>

    <meta name="robots" content="noindex, nofollow">
    <meta name="googlebot" content="noindex, nofollow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(239, 87, 119, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(239, 87, 119, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            background: #1a1a1a;
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 45px;
            width: 100%;
            max-width: 750px;
            box-shadow: 0px 30px 90px rgba(0, 0, 0, 0.5), 
                        0px 0px 0px 1px rgba(239, 87, 119, 0.2);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 38px;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #ef5777 0%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Playfair Display', serif;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            cursor: pointer;
            color: #999;
            background: #0f0f0f;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            min-width: 160px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .tab i {
            margin-right: 10px;
            font-size: 18px;
        }

        .tab::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .tab:hover::before {
            width: 300px;
            height: 300px;
        }

        .tab:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .tab.active {
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
        }

        /* Nirosha Tab - Blue Theme */
        .tab[data-actress="nirosha"] {
            background: #0f0f0f;
            color: #999;
        }

        .tab[data-actress="nirosha"]:hover {
            background: rgba(60, 64, 198, 0.2);
            border-color: rgba(60, 64, 198, 0.3);
            color: #3c40c6;
        }

        .tab[data-actress="nirosha"].active {
            background: #3c40c6;
            color: #fff;
            box-shadow: 0 8px 30px rgba(60, 64, 198, 0.5);
        }

        .tab[data-actress="nirosha"].active::before {
            width: 300px;
            height: 300px;
        }

        /* Michelle Tab - Orange Theme */
        .tab[data-actress="michelle"] {
            background: #0f0f0f;
            color: #999;
        }

        .tab[data-actress="michelle"]:hover {
            background: rgba(255, 168, 1, 0.2);
            border-color: rgba(255, 168, 1, 0.3);
            color: #ffa801;
        }

        .tab[data-actress="michelle"].active {
            background: #ffa801;
            color: #fff;
            box-shadow: 0 8px 30px rgba(255, 168, 1, 0.5);
        }

        .tab[data-actress="michelle"].active::before {
            width: 300px;
            height: 300px;
        }

        /* Sandani Tab - Red/Pink Theme */
        .tab[data-actress="sandani"] {
            background: #0f0f0f;
            color: #999;
        }

        .tab[data-actress="sandani"]:hover {
            background: rgba(245, 59, 87, 0.2);
            border-color: rgba(245, 59, 87, 0.3);
            color: #f53b57;
        }

        .tab[data-actress="sandani"].active {
            background: #f53b57;
            color: #fff;
            box-shadow: 0 8px 30px rgba(245, 59, 87, 0.5);
        }

        .tab[data-actress="sandani"].active::before {
            width: 300px;
            height: 300px;
        }

        .caption-counter {
            font-size: 15px;
            margin-bottom: 20px;
            color: #ef5777;
            font-weight: 600;
            padding: 12px 24px;
            background: rgba(239, 87, 119, 0.15);
            border-radius: 50px;
            display: inline-block;
            border: 2px solid rgba(239, 87, 119, 0.3);
        }

        .caption-counter i {
            margin-right: 10px;
            color: #ff6b9d;
        }

        #caption-box {
            width: 100%;
            min-height: 200px;
            font-size: 19px;
            padding: 35px;
            border: 3px solid rgba(239, 87, 119, 0.2);
            border-radius: 20px;
            background: #0f0f0f;
            color: #fff;
            resize: none;
            overflow-y: auto;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 500;
            line-height: 1.7;
            transition: all 0.3s ease;
            box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.3);
            font-family: 'Noto Sans Sinhala', 'Poppins', sans-serif;
        }

        #caption-box:focus {
            outline: none;
            border-color: rgba(239, 87, 119, 0.5);
            box-shadow: inset 0 4px 15px rgba(0, 0, 0, 0.3), 
                        0 0 0 4px rgba(239, 87, 119, 0.2);
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 16px 30px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: #fff;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            flex: 1;
            min-width: 150px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 350px;
            height: 350px;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            background: #333;
            cursor: not-allowed;
            opacity: 0.6;
        }

        button i {
            margin-right: 10px;
        }

        #next-button i {
            margin-right: 0;
            margin-left: 10px;
        }

        /* Control Buttons - Pink Theme */
        #previous-button,
        #next-button {
            background: #ef5777;
            min-width: 140px;
        }

        #previous-button:hover,
        #next-button:hover {
            background: #ff6b9d;
            box-shadow: 0 8px 30px rgba(239, 87, 119, 0.5);
            transform: translateY(-3px);
        }

        #reset-button {
            background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
            min-width: 140px;
        }

        #reset-button:hover {
            background: linear-gradient(135deg, #3d4446 0%, #737e82 100%);
            box-shadow: 0 8px 30px rgba(45, 52, 54, 0.5);
            transform: translateY(-3px);
        }

        /* Scrollbar Styling */
        #caption-box::-webkit-scrollbar {
            width: 10px;
        }

        #caption-box::-webkit-scrollbar-track {
            background: rgba(239, 87, 119, 0.1);
            border-radius: 10px;
        }

        #caption-box::-webkit-scrollbar-thumb {
            background: #ef5777;
            border-radius: 10px;
        }

        #caption-box::-webkit-scrollbar-thumb:hover {
            background: #ff6b9d;
        }

        /* Star decoration */
        .star-decoration {
            position: absolute;
            font-size: 24px;
            color: #ef5777;
            opacity: 0.15;
            animation: float 3s ease-in-out infinite;
        }

        .star-1 {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
        }

        .star-2 {
            top: 15%;
            right: 8%;
            animation-delay: 1s;
        }

        .star-3 {
            bottom: 20%;
            left: 10%;
            animation-delay: 2s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 30px;
            }

            .subtitle {
                font-size: 13px;
            }

            #caption-box {
                font-size: 17px;
                min-height: 170px;
                padding: 25px;
            }

            .tab {
                font-size: 14px;
                padding: 14px 24px;
                min-width: 140px;
            }

            button {
                font-size: 15px;
                padding: 14px 24px;
                min-width: 130px;
            }

            .tabs {
                gap: 12px;
            }

            .control-buttons {
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 26px;
            }

            .tab {
                min-width: 120px;
                font-size: 13px;
            }

            button {
                min-width: 110px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <i class="fas fa-star star-decoration star-1"></i>
        <i class="fas fa-star star-decoration star-2"></i>
        <i class="fas fa-sparkles star-decoration star-3"></i>

        <h1>Actress Captions ✨</h1>
        <p class="subtitle">Select your favorite actress and get amazing captions</p>
        
        <div class="tabs">
            <div class="tab" data-actress="nirosha">
                <i class="fas fa-trophy"></i>Nirosha
            </div>
            <div class="tab" data-actress="michelle">
                <i class="fas fa-pepper-hot"></i>Michelle
            </div>
            <div class="tab" data-actress="sandani">
                <i class="fas fa-crown"></i>Sandani
            </div>
        </div>

        <div class="caption-counter" id="caption-counter">
            <i class="fas fa-list-ol"></i>Loading...
        </div>
        
        <textarea id="caption-box" readonly></textarea>
        
        <div class="control-buttons">
            <button id="previous-button"><i class="fas fa-chevron-left"></i>Previous</button>
            <button id="next-button">Next<i class="fas fa-chevron-right"></i></button>
            <button id="reset-button"><i class="fas fa-redo-alt"></i>Reset</button>
        </div>
    </div>

    <audio id="reset-sound" src="reset.mp3"></audio>
    <audio id="click-sound" src="click.mp3"></audio>
    <audio id="tab-sound" src="notification.mp3"></audio>

    <script>
        let captions = []; // General captions from captions.txt
        let niroshaCaptions = [];
        let michelleCaptions = [];
        let sandaniCaptions = [];
        let usedCaptions = JSON.parse(localStorage.getItem('usedActressCaptions')) || [];
        let currentCaptionIndex = 0;
        let captionsArray = [];
        let currentActress = 'general'; // Start with general captions
        const captionBox = document.getElementById("caption-box");
        const captionCounter = document.getElementById("caption-counter");
        const resetSound = document.getElementById("reset-sound");
        const clickSound = document.getElementById("click-sound");
        const tabSound = document.getElementById("tab-sound");

        // Function to shuffle an array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Function to update the active tab state
        function updateActiveTab(actress) {
            // Remove active class from all tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Add active class to the selected tab (if not general)
            if (actress !== 'general') {
                document.querySelector(`.tab[data-actress="${actress}"]`).classList.add('active');
            }
        }

        // Function to update caption counter
        function updateCounter() {
            const total = captionsArray.length;
            const current = currentCaptionIndex + 1;
            let actressName = '';
            
            switch(currentActress) {
                case 'nirosha':
                    actressName = 'Nirosha';
                    break;
                case 'michelle':
                    actressName = 'Michelle';
                    break;
                case 'sandani':
                    actressName = 'Sandani';
                    break;
                default:
                    actressName = 'General';
            }
            
            captionCounter.innerHTML = `<i class="fas fa-list-ol"></i>${actressName}: ${current} of ${total}`;
        }

        // Load captions from files
        async function loadCaptions() {
            try {
                // Load general captions first
                const generalResponse = await fetch('captions.txt');
                const generalText = await generalResponse.text();
                captions = generalText.split('----').map(c => c.trim()).filter(c => c);
                shuffleArray(captions);

                // Load actress captions
                const niroshaResponse = await fetch('nirosha.txt');
                const niroshaText = await niroshaResponse.text();
                niroshaCaptions = niroshaText.split('----').map(c => c.trim()).filter(c => c);
                shuffleArray(niroshaCaptions);

                const michelleResponse = await fetch('michelle.txt');
                const michelleText = await michelleResponse.text();
                michelleCaptions = michelleText.split('----').map(c => c.trim()).filter(c => c);
                shuffleArray(michelleCaptions);

                const sandaniResponse = await fetch('sandani.txt');
                const sandaniText = await sandaniResponse.text();
                sandaniCaptions = sandaniText.split('----').map(c => c.trim()).filter(c => c);
                shuffleArray(sandaniCaptions);

                // Start with general captions
                captionsArray = captions;
                currentCaptionIndex = 0;
                currentActress = 'general';
                updateActiveTab('general'); // No tab active initially
                showCaption();
            } catch (error) {
                captionBox.value = "Error loading captions!";
                captionCounter.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Error';
                console.error(error);
            }
        }

        // Function to display the current caption in the caption box
        function showCaption() {
            if (captionsArray.length > 0) {
                captionBox.value = captionsArray[currentCaptionIndex];
                updateCounter();
            } else {
                captionBox.value = "No captions available!";
                captionCounter.innerHTML = '<i class="fas fa-exclamation-circle"></i> No captions';
            }
        }

        // Tab click handlers
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const actress = this.getAttribute('data-actress');
                tabSound.play();
                
                currentActress = actress;
                currentCaptionIndex = 0;
                
                // Switch caption arrays based on selected actress
                switch(actress) {
                    case 'nirosha':
                        captionsArray = niroshaCaptions;
                        break;
                    case 'michelle':
                        captionsArray = michelleCaptions;
                        break;
                    case 'sandani':
                        captionsArray = sandaniCaptions;
                        break;
                }
                
                shuffleArray(captionsArray); // Shuffle for randomness
                updateActiveTab(actress);
                showCaption();
            });
        });

        // Function to copy the current caption and move to the next
        function copyAndNext() {
            const currentCaption = captionBox.value;

            // Copy the current caption to clipboard
            navigator.clipboard.writeText(currentCaption)
                .then(() => {
                    console.log('Copied to clipboard:', currentCaption);
                })
                .catch(err => {
                    console.error('Could not copy text:', err);
                });

            // Move to the next caption
            currentCaptionIndex = (currentCaptionIndex + 1) % captionsArray.length;
            showCaption();
        }

        // Button handler for "Next"
        document.getElementById("next-button").addEventListener("click", function () {
            clickSound.play();
            copyAndNext();
        });

        // Button handler for "Previous"
        document.getElementById("previous-button").addEventListener("click", function () {
            clickSound.play();
            if (captionsArray.length > 0) {
                currentCaptionIndex = (currentCaptionIndex - 1 + captionsArray.length) % captionsArray.length;
                showCaption();
            }
        });

        // Button handler for "Reset"
        document.getElementById("reset-button").addEventListener("click", function () {
            resetSound.play();
            localStorage.removeItem('usedActressCaptions');
            usedCaptions = [];
            currentCaptionIndex = 0;
            
            // Reset to general captions
            currentActress = 'general';
            captionsArray = captions;
            shuffleArray(captionsArray); // Shuffle captions
            updateActiveTab('general');
            showCaption();
        });

        // Load captions on page load
        loadCaptions();

    </script>

</body>

</html>
